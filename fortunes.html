<!DOCTYPE html>
<html>
    <head>
        <style>
            html,body{
                margin: 0;
                padding: 0;
                overflow: hidden;
                background-color: black;
                font-family: Arial, Helvetica, sans-serif;
                color: aliceblue;
                text-shadow: 0px 0px 2dvh blue, 0px 0px 1dvh blue, 0px 0px 7dvh blue;
                height: 100%;
                position: fixed;
                width: 100%;
            }
            .stretch {
                height: auto;
                width: 100%;
            }

            #bg{
                position: absolute;
                height: 100%;
                z-index: 0;
                transform: translateY(0);
            }
            #imageContainer {
                position: absolute;
                width: 100%;
                 height: 100%;
                z-index: 1;
            }

  #imageContainer img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    opacity: 1;
    transition: opacity 2s ease;
  }

#textContainer {
  position: absolute;
  text-align: center;
  left: 50%;
  transform: translate(-50%, 100vh); /* start off screen */
  width: 80%;
  max-width: 800px;
  font-size: 9dvh; /* slightly smaller helps too */
  bottom: auto;   /* remove bottom entirely */
}

#textContainer.show {
  animation: scrollUp 20s linear forwards;
  opacity: 1;

}

@keyframes scrollUp {
  from {
    transform: translate(-50%, 100vh);
  }
  to {
    transform: translate(-50%, -100%);
  }
}

  #buttonContainer {
    position: absolute;
    z-index: 200;
    left: 50%;
    transform: translateX(-50%);
    bottom: 20px;
    width: auto;
    display: none;
  }

  /* random image (zoom + fade) */
#randomImage {
  position: relative;
  z-index: 2;
  transform: scale(0.1);
  opacity: 1;
}

/* when active */
#randomImage.animate {
  animation: zoomIn 2s ease forwards;
}

/* zoom animation */
@keyframes zoomIn {
  from {
    transform: scale(0.1);
  }
  to {
    transform: scale(1);
  }
}

/* supernova spinning */
#supernova {
  position: fixed;      /* always relative to viewport */
  top: 50%;
  left: 50%;
  width: 300vw;         /* 3x viewport width */
  height: 300dvh;        /* 3x viewport height */
  object-fit: cover;    /* cover while keeping aspect ratio */
  transform: translate(-50%, -50%) rotate(0deg); /* centered */
  z-index: 1;           /* behind randomImage */
  opacity: 0.8;
  pointer-events: none; /* don’t block clicks */
}

#randomImage, #supernova {
  transition: opacity 2s ease; /* smooth fade */
}

/* spinning animation */
#supernova.animate {
  animation: spin 4s linear infinite;
}

@keyframes spin {
  from { transform: translate(-50%, -50%) rotate(0deg); }
  to   { transform: translate(-50%, -50%) rotate(360deg); }
}

  button {
    padding: 10px 20px;
    font-family: Arial, Helvetica, sans-serif;
    color: aliceblue;
    text-shadow: 0px 0px 2dvh blue, 0px 0px 1dvh blue, 0px 0px 7dvh blue;
    font-size: xx-large ;
    cursor: pointer;
    border-radius: 5px;
    border: none;
    background: transparent;
    box-shadow: 0px 0px 15px blue;
  }
</style>
</head>
<body>
 <img src="images/divination-bg.png" id="bg" class="stretch"> 
 <img id="supernova" src="images/supernova.png">
<div id="imageContainer">
 
  <img id="randomImage" src="">
</div>

<div id="buttonContainer">
  <button onclick="location.reload()">Try Again</button>
</div>

function getRandom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function startSequence() {
  const img = document.getElementById("randomImage");
  const supernova = document.getElementById("supernova");
  const textBox = document.getElementById("textContainer");
  const button = document.getElementById("buttonContainer");

  // reset
  button.style.display = "none";

  textBox.classList.remove("show");
  void textBox.offsetWidth;
  textBox.style.bottom = "-100dvh";

  img.style.opacity = 1;
  img.classList.remove("animate");

  supernova.style.opacity = 1;
  supernova.classList.remove("animate");

  // force reset animations
  void img.offsetWidth;
  void supernova.offsetWidth;

  // content
  img.src = getRandom(images);
  textBox.innerText = getRandom(texts);

  // start animations immediately
  img.classList.add("animate");
  supernova.classList.add("animate");

  // fade both out after 2s
  setTimeout(() => {
    img.style.opacity = 0;
    supernova.style.opacity = 0;
  }, 2000);

  // show text
  setTimeout(() => {
    textBox.classList.add("show");
  }, 400);

  // show button
  setTimeout(() => {
    button.style.display = "block";
  }, 12000);
}
// start automatically
